<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lawyers — Casa Legal Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <span class="topbar-title" id="topbar-title"></span>
    </header>
    <div class="page-body">

      <div class="page-header">
        <div><h2>Lawyers</h2><p id="count"></p></div>
        <button class="btn btn-primary" onclick="openModal('modal')">➕ Add Lawyer</button>
      </div>

      <div class="table-wrapper">
        <div class="table-toolbar">
          <input class="search-input" id="search" placeholder="Search lawyers…" oninput="renderTable()" />
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>#</th><th>Full Name</th><th>Specialization</th><th>Email</th><th>Actions</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal('modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>Add Lawyer</h3>
      <button class="modal-close" onclick="closeModal('modal')">×</button>
    </div>
    <form id="form">
      <div class="modal-body">
        <div class="form-group"><label>Full Name</label><input id="f-name" class="form-control" required /></div>
        <div class="form-group"><label>Specialization</label><input id="f-spec" class="form-control" required /></div>
        <div class="form-group"><label>Email</label><input id="f-email" type="email" class="form-control" required /></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btn-save">Add Lawyer</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
  buildShell('lawyers', 'Lawyers');
  let all = [];

  async function load() {
    showLoading('tbody', 5);
    all = await apiFetch('/lawyers') || [];
    document.getElementById('count').textContent = `${all.length} registered lawyers`;
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const rows = all.filter(l => (l.fullName||'').toLowerCase().includes(q) || (l.specialization||'').toLowerCase().includes(q));
    if (!rows.length) { showEmpty('tbody', 5, '👨⚖️', 'No lawyers found'); return; }
    document.getElementById('tbody').innerHTML = rows.map(l => `
      <tr>
        <td>${l.id}</td>
        <td><strong>${l.fullName}</strong></td>
        <td><span class="badge badge-default">${l.specialization||'—'}</span></td>
        <td>${l.email||'—'}</td>
        <td><div class="td-actions"><button class="btn btn-danger btn-sm" onclick="del(${l.id})">🗑</button></div></td>
      </tr>`).join('');
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await apiPost('/lawyers', {
        fullName:       document.getElementById('f-name').value,
        specialization: document.getElementById('f-spec').value,
        email:          document.getElementById('f-email').value,
      });
      closeModal('modal'); document.getElementById('form').reset(); load();
    } finally { btn.disabled = false; btn.textContent = 'Add Lawyer'; }
  });

  async function del(id) {
    if (!confirm('Delete this lawyer?')) return;
    await apiDelete(`/lawyers/${id}`); load();
  }

  load();
</script>
</body>
</html>
